<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAST_Grocery Professional Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>

<body class="bg-gray-100">

<!-- LOGIN -->
<div id="loginScreen" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50">
    <div class="bg-white p-10 rounded-3xl shadow-2xl w-[90%] max-w-md">
        <h2 class="text-3xl font-bold text-center text-green-700 mb-8">FAST_Grocery Admin Login</h2>
        <input type="email" id="adminEmail" placeholder="Admin Email" class="border p-4 rounded-xl w-full mb-4"/>
        <input type="password" id="adminPassword" placeholder="Password" class="border p-4 rounded-xl w-full mb-5"/>
        <button onclick="adminLogin()" class="bg-green-600 text-white w-full py-4 rounded-2xl font-bold">Login</button>
        <p id="loginError" class="text-red-500 text-center mt-4"></p>
    </div>
</div>

<div class="flex">

<!-- SIDEBAR -->
<div class="w-64 bg-green-700 min-h-screen text-white p-5">
    <h1 class="text-3xl font-bold mb-10">FAST_Grocery</h1>
    <ul class="space-y-4">
        <li class="bg-green-900 p-3 rounded">Dashboard</li>
        <li class="bg-green-800 p-3 rounded">Orders</li>
        <li class="bg-green-800 p-3 rounded">Customers</li>
        <li class="bg-green-800 p-3 rounded">Products</li>
        <li class="bg-green-800 p-3 rounded">Offers</li>
        <li onclick="logout()" class="bg-red-500 p-3 rounded cursor-pointer">Logout</li>
    </ul>
</div>

<!-- MAIN -->
<div class="flex-1 p-6">

<h2 class="text-4xl font-bold mb-8">Professional Admin Dashboard</h2>

<!-- DASHBOARD -->
<div class="grid md:grid-cols-5 gap-5 mb-10">

    <div class="bg-white p-6 rounded-2xl shadow">
        <h3>Total Orders</h3>
        <p id="totalOrders" class="text-4xl font-bold text-green-700">0</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h3>Pending</h3>
        <p id="pendingOrders" class="text-4xl font-bold text-yellow-500">0</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h3>Delivered</h3>
        <p id="completedOrders" class="text-4xl font-bold text-blue-600">0</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h3>Customers</h3>
        <p id="customers" class="text-4xl font-bold text-red-600">0</p>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow">
        <h3>Total Spent</h3>
        <p id="totalSpent" class="text-4xl font-bold text-purple-600">0৳</p>
    </div>

</div>

<!-- CUSTOMERS -->
<div class="bg-white p-6 rounded-2xl shadow mb-10">
    <h3 class="text-2xl font-bold mb-5">👤 Customers (VIP System)</h3>
    <div id="customerList"></div>
</div>

<!-- ORDERS -->
<div class="bg-white p-6 rounded-2xl shadow">
    <h3 class="text-2xl font-bold mb-5">📦 Orders</h3>
    <div id="orderList"></div>
</div>

</div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAHqRScSfPxa4Td7qNMCxVI33lUUBSxDaY",
    authDomain: "fast-grocery-main.firebaseapp.com",
    projectId: "fast-grocery-main",
    storageBucket: "fast-grocery-main.firebasestorage.app",
    messagingSenderId: "460861797881",
    appId: "1:460861797881:web:600da3e16a68f80caeb928",
    measurementId: "G-P8672BMNM6"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();
</script>

<script>
// LOGIN
function adminLogin(){
    const email = adminEmail.value;
    const pass = adminPassword.value;

    auth.signInWithEmailAndPassword(email, pass)
    .then(()=> loginScreen.style.display="none")
    .catch(()=> loginError.innerText="Login Failed");
}

auth.onAuthStateChanged(user=>{
    if(user){
        loginScreen.style.display="none";
        loadAll();
    }else{
        loginScreen.style.display="flex";
    }
});

function logout(){ auth.signOut(); }

// MAIN LOAD
function loadAll(){
    loadDashboard();
    loadOrders();
    loadCustomers();
}

// DASHBOARD
async function loadDashboard(){
    const ordersSnap = await db.collection("orders").get();
    const custSnap = await db.collection("customers").get();

    let pending=0, delivered=0, totalSpent=0;

    ordersSnap.forEach(doc=>{
        const d = doc.data();
        if(d.status=="Delivered") delivered++;
        else pending++;

        totalSpent += Number(d.total || 0);
    });

    totalOrders.innerText = ordersSnap.size;
    pendingOrders.innerText = pending;
    completedOrders.innerText = delivered;
    customers.innerText = custSnap.size;
    totalSpent.innerText = totalSpent + "৳";
}

// CUSTOMERS (NEW SYSTEM)
async function loadCustomers(){
    const snap = await db.collection("customers").get();
    let html="";

    snap.forEach(doc=>{
        const c = doc.data();

        let type = c.customerType || "Normal";
        let color = type=="VIP" ? "text-yellow-600" : "text-gray-700";

        html += `
        <div class="border p-4 rounded-xl mb-3 flex justify-between items-center">
            <div>
                <p class="font-bold">📞 ${c.phone}</p>
                <p>Total Orders: ${c.totalOrders || 0}</p>
                <p>Total Spent: ${c.totalSpent || 0}৳</p>
            </div>
            <div class="${color} font-bold text-xl">
                ${type}
            </div>
        </div>`;
    });

    customerList.innerHTML = html;
}

// ORDERS
async function loadOrders(){
    const snap = await db.collection("orders").get();
    let html="";

    snap.forEach(doc=>{
        const d = doc.data();

        html += `
        <div class="border p-4 rounded-xl mb-4">
            <p>👤 ${d.name}</p>
            <p>📞 ${d.phone}</p>
            <p>📦 ${d.product}</p>
            <p>💰 ${d.total}৳</p>

            <select onchange="updateStatus('${doc.id}',this.value)" class="border p-2 mt-2">
                <option ${d.status=="Pending"?"selected":""}>Pending</option>
                <option ${d.status=="Processing"?"selected":""}>Processing</option>
                <option ${d.status=="Delivered"?"selected":""}>Delivered</option>
                <option ${d.status=="Cancelled"?"selected":""}>Cancelled</option>
            </select>
        </div>`;
    });

    orderList.innerHTML = html;
}

// STATUS UPDATE + AUTO CUSTOMER SYSTEM
async function updateStatus(id,status){

    await db.collection("orders").doc(id).update({status});

    const orderDoc = await db.collection("orders").doc(id).get();
    const o = orderDoc.data();

    if(o.phone){
        const custRef = db.collection("customers").doc(o.phone);
        const custDoc = await custRef.get();

        if(custDoc.exists){
            let c = custDoc.data();

            let newSpent = (c.totalSpent || 0);
            let newOrders = (c.totalOrders || 0);

            if(status=="Delivered"){
                newSpent += Number(o.total || 0);
                newOrders += 1;
            }

            let type = newSpent > 5000 ? "VIP" : "Normal";

            await custRef.update({
                totalSpent: newSpent,
                totalOrders: newOrders,
                customerType: type
            });

        }else{
            await custRef.set({
                phone: o.phone,
                totalSpent: o.total || 0,
                totalOrders: status=="Delivered"?1:0,
                customerType: (o.total>5000?"VIP":"Normal")
            });
        }
    }

    loadAll();
}
</script>

</body>
</html>
